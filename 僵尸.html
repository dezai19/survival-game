<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射击游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #4CAF50;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            background-color: #4CAF50;
        }
        #killCount {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
        #waveCount {
            position: absolute;
            top: 60px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
        #waveTimer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 72px;
            font-weight: bold;
            text-align: center;
            z-index: 15;
            display: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            z-index: 20;
            display: none;
        }
        #expBarContainer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            z-index: 10;
            overflow: hidden;
        }
        #expBar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: #FFFF00;
            transition: width 0.3s ease;
        }
        #levelText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 11;
        }
        #ammoCount {
            position: absolute;
            top: 100px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="killCount">kill 0</div>
    <div id="waveCount">wave 1</div>
    <div id="ammoCount">ammo 5/5</div>
    <div id="waveTimer"></div>
    <div id="gameOver">
        <div>游戏结束</div>
        <div id="finalKillCount">kill 0</div>
    </div>
    <div id="expBarContainer">
        <div id="expBar"></div>
        <div id="levelText">Lv1</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const killCountElement = document.getElementById('killCount');
        const waveCountElement = document.getElementById('waveCount');
        const ammoCountElement = document.getElementById('ammoCount');
        const waveTimerElement = document.getElementById('waveTimer');
        const gameOverElement = document.getElementById('gameOver');
        const finalKillCountElement = document.getElementById('finalKillCount');
        const expBarElement = document.getElementById('expBar');
        const levelTextElement = document.getElementById('levelText');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let gameRunning = true;
        let killCount = 0;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        
        // 经验和等级相关变量
        let level = 1;
        let exp = 0;
        let expToNextLevel = 3;
        
        // 波次相关变量
        let wave = 1;
        let waveActive = false;
        let waveMonsters = [];
        let waveMonsterCount = 0;
        let waveTimer = 5;
        let waveTimerActive = false;
        let lastTime = 0;
        let monsterSpawned = 0;
        
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            vx: 0,
            vy: 0,
            // 更灵敏的移动参数（像素/秒）
            maxSpeed: 240,
            acceleration: 2000,
            deceleration: 1800,
            // 滑套（slide）相关
            slideOffset: 0,
            slideMax: 12,
            color: '#FF0000',
            ammo: 5,
            maxAmmo: 5,
            isReloading: false,
            reloadTime: 3,
            reloadProgress: 0,
            gunRecoil: 0,
            isEmptyFire: false
        };
        
        const keys = {};
        const bullets = [];
        const monsters = [];
        const particles = [];
        
        class Bullet {
            constructor(x, y, mouseX, mouseY) {
                this.x = x;
                this.y = y;
                // 更小更快的子弹
                this.size = 5;
                this.speed = 14;
                this.color = '#FFFF00';
                
                const dx = mouseX - x;
                const dy = mouseY - y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                this.vx = (dx / distance) * this.speed;
                this.vy = (dy / distance) * this.speed;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
            
            isOutOfBounds() {
                return this.x < -this.size || this.x > canvas.width + this.size ||
                       this.y < -this.size || this.y > canvas.height + this.size;
            }
        }
        
        class Monster {
                    constructor(type = 'normal') {
                        const side = Math.floor(Math.random() * 4);
                        switch(side) {
                            case 0: // 顶部
                                this.x = Math.random() * canvas.width;
                                this.y = -20;
                                break;
                            case 1: // 右侧
                                this.x = canvas.width + 20;
                                this.y = Math.random() * canvas.height;
                                break;
                            case 2: // 底部
                                this.x = Math.random() * canvas.width;
                                this.y = canvas.height + 20;
                                break;
                            case 3: // 左侧
                                this.x = -20;
                                this.y = Math.random() * canvas.height;
                                break;
                        }

                        this.type = type;
                        // 不同类型属性
                        if (type === 'fast') {
                            this.size = 13;
                            this.speed = 5.5;
                            this.color = '#800080'; // 紫色
                            this.eyeColor = '#FFFFFF'; // 白眼
                            this.hp = 1;
                        } else if (type === 'tank') {
                            this.size = 18;
                            this.speed = 2.2;
                            this.color = '#808080'; // 灰色
                            this.eyeColor = '#FFFF00'; // 黄眼
                            this.hp = 3;
                        } else {
                            this.size = 15;
                            this.speed = 3.5;
                            this.color = '#2E7D32';
                            this.eyeColor = '#FFFF00';
                            this.hp = 1;
                        }

                        this.vx = 0;
                        this.vy = 0;
                        this.hitTimer = 0; // 受击短暂硬直/击退计时
                        this.knockbackVX = 0;
                        this.knockbackVY = 0;
                    }

                    takeDamage(damage, bvx = 0, bvy = 0) {
                        this.hp -= damage;

                        // 受击粒子
                        for (let i = 0; i < 6; i++) {
                            particles.push(new Particle(this.x + (Math.random()-0.5)*8, this.y + (Math.random()-0.5)*8, 'normal'));
                        }

                        // 计算击退方向（与子弹速度方向相反）
                        const bnorm = Math.sqrt(bvx*bvx + bvy*bvy) || 1;
                        const knock = 7; // 击退强度
                        this.knockbackVX = -(bvx / bnorm) * knock;
                        this.knockbackVY = -(bvy / bnorm) * knock;
                        this.hitTimer = 0.18; // 击退持续

                        // 返回是否死亡
                        return this.hp <= 0;
                    }

                    update(deltaTime) {
                        // 如果处于受击击退状态，优先应用击退移动
                        if (this.hitTimer > 0) {
                            this.x += this.knockbackVX * deltaTime * 60;
                            this.y += this.knockbackVY * deltaTime * 60;
                            // 击退衰减
                            this.knockbackVX *= 0.9;
                            this.knockbackVY *= 0.9;
                            this.hitTimer -= deltaTime;
                            return;
                        }

                        const dx = player.x - this.x;
                        const dy = player.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy) || 1;
                        this.vx = (dx / distance) * this.speed;
                        this.vy = (dy / distance) * this.speed;

                        // ===== 碰撞避免逻辑 =====
                        for (let other of monsters) {
                            if (other === this) continue;

                            const odx = other.x - this.x;
                            const ody = other.y - this.y;
                            const oDist = Math.sqrt(odx * odx + ody * ody) || 1;
                            const minDist = this.size + other.size + 8; // 最小安全距离

                            if (oDist < minDist && oDist > 0) {
                                const repulsionForce = (minDist - oDist) / minDist * 1.5;
                                const repulseVx = -(odx / oDist) * repulsionForce;
                                const repulseVy = -(ody / oDist) * repulsionForce;

                                this.vx += repulseVx;
                                this.vy += repulseVy;
                            }
                        }

                        // 限制速度大小不超过原始速度
                        const finalSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy) || 1;
                        if (finalSpeed > this.speed) {
                            this.vx = (this.vx / finalSpeed) * this.speed;
                            this.vy = (this.vy / finalSpeed) * this.speed;
                        }

                        this.x += this.vx * deltaTime * 60;
                        this.y += this.vy * deltaTime * 60;
                    }

                    draw() {
                        // 绘制僵尸身体
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        ctx.closePath();

                        // 眼睛绘制（根据类型颜色）
                        const eyeSize = 4;
                        const eyeOffsetX = Math.max(4, this.size / 2);
                        const eyeOffsetY = -Math.max(3, this.size / 6);

                        // 左眼
                        ctx.beginPath();
                        ctx.arc(this.x - eyeOffsetX, this.y + eyeOffsetY, eyeSize, 0, Math.PI * 2);
                        ctx.fillStyle = this.eyeColor || '#FFFF00';
                        ctx.fill();
                        ctx.closePath();

                        // 右眼
                        ctx.beginPath();
                        ctx.arc(this.x + eyeOffsetX, this.y + eyeOffsetY, eyeSize, 0, Math.PI * 2);
                        ctx.fillStyle = this.eyeColor || '#FFFF00';
                        ctx.fill();
                        ctx.closePath();
                    }
        }
        
        class Particle {
            constructor(x, y, type = 'normal') {
                this.x = x;
                this.y = y;
                this.size = 5;
                this.type = type;
                
                if (type === 'normal') {
                    this.color = '#2E7D32';
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 3 + Math.random() * 3;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.lifetime = 0.6;
                } else if (type === 'shell') {
                    this.color = '#FFD700';
                    this.size = 3;
                    const angle = Math.random() * 0.5 + Math.PI;
                    const speed = 4 + Math.random() * 3;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 2;
                    this.lifetime = 1;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = Math.random() * 0.3;
                } else if (type === 'muzzle') {
                    // 更明显的火光：更大、更亮、短寿命
                    this.color = '#FFFF88';
                    this.size = 12 + Math.random() * 6;
                    this.lifetime = 0.12;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 0.8;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1;
                }
                this.alpha = 1;
                this.age = 0;
            }
            
            update(deltaTime) {
                this.x += this.vx;
                this.y += this.vy;
                this.age += deltaTime;
                
                if (this.type === 'shell') {
                    this.vy += 0.1;
                    this.rotation += this.rotationSpeed;
                }
                
                this.alpha = 1 - (this.age / this.lifetime);
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                
                if (this.type === 'shell') {
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size / 2, -this.size / 3, this.size, this.size * 0.66);
                } else if (this.type === 'muzzle') {
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.closePath();
                    ctx.globalCompositeOperation = 'source-over';
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                }
                ctx.restore();
            }
            
            isAlive() {
                return this.age < this.lifetime;
            }
        }
        
        function checkCollision(rect1, rect2) {
            return Math.abs(rect1.x - rect2.x) < (rect1.size + rect2.size) / 2 &&
                   Math.abs(rect1.y - rect2.y) < (rect1.size + rect2.size) / 2;
        }
        
        function createExplosion(x, y) {
            const particleCount = 8;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y, 'normal'));
            }
        }
        
        function fireGun() {
            if (gameRunning && !player.isReloading && player.ammo > 0 && !player.isEmptyFire) {
                const gunX = player.x + 15;
                const gunY = player.y - 3;
                
                // 更多更亮的火光粒子
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(gunX, gunY, 'muzzle'));
                }
                
                // 抛出单个弹壳，从套筒/枪侧偏移位置发出
                particles.push(new Particle(gunX - 6, gunY + 2, 'shell'));
                
                player.gunRecoil = 18;
                
                const dx = mouseX - player.x;
                const dy = mouseY - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const bulletX = gunX + (dx / distance) * 5;
                const bulletY = gunY + (dy / distance) * 5;
                
                bullets.push(new Bullet(bulletX, bulletY, mouseX, mouseY));
                player.ammo--;
                updateAmmoDisplay();
                
                if (player.ammo === 0) {
                    player.isEmptyFire = true;
                }
            }
        }
        
        function updatePlayer(deltaTime) {
            const dt = deltaTime || (1 / 60);
            // 目标速度（像素/秒）
            let targetVx = 0;
            let targetVy = 0;

            if (keys['w']) targetVy = -player.maxSpeed;
            if (keys['s']) targetVy = player.maxSpeed;
            if (keys['a']) targetVx = -player.maxSpeed;
            if (keys['d']) targetVx = player.maxSpeed;

            // X 方向加速/减速（基于秒）
            if (targetVx !== 0) {
                if (Math.abs(player.vx) < Math.abs(targetVx)) {
                    player.vx += Math.sign(targetVx) * player.acceleration * dt;
                    if (Math.abs(player.vx) > Math.abs(targetVx)) player.vx = targetVx;
                }
            } else {
                if (player.vx > 0) {
                    player.vx -= player.deceleration * dt;
                    if (player.vx < 0) player.vx = 0;
                } else if (player.vx < 0) {
                    player.vx += player.deceleration * dt;
                    if (player.vx > 0) player.vx = 0;
                }
            }

            // Y 方向加速/减速（基于秒）
            if (targetVy !== 0) {
                if (Math.abs(player.vy) < Math.abs(targetVy)) {
                    player.vy += Math.sign(targetVy) * player.acceleration * dt;
                    if (Math.abs(player.vy) > Math.abs(targetVy)) player.vy = targetVy;
                }
            } else {
                if (player.vy > 0) {
                    player.vy -= player.deceleration * dt;
                    if (player.vy < 0) player.vy = 0;
                } else if (player.vy < 0) {
                    player.vy += player.deceleration * dt;
                    if (player.vy > 0) player.vy = 0;
                }
            }

            // 根据速度（像素/秒）和 deltaTime 更新位置
            player.x += player.vx * dt;
            player.y += player.vy * dt;

            // 边界检测
            if (player.x < player.size / 2) player.x = player.size / 2;
            if (player.x > canvas.width - player.size / 2) player.x = canvas.width - player.size / 2;
            if (player.y < player.size / 2) player.y = player.size / 2;
            if (player.y > canvas.height - player.size / 2) player.y = canvas.height - player.size / 2;
        }
        
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                        const b = bullets[i];
                        b.update();

                        if (b.isOutOfBounds()) {
                            bullets.splice(i, 1);
                            continue;
                        }

                        for (let j = monsters.length - 1; j >= 0; j--) {
                            if (checkCollision(b, monsters[j])) {
                                // 创建爆炸/击中效果
                                createExplosion(monsters[j].x, monsters[j].y);

                                // 移除子弹
                                bullets.splice(i, 1);

                                // 对僵尸造成伤害并触发击退/受击效果
                                const dead = monsters[j].takeDamage(1, b.vx, b.vy);

                                if (dead) {
                                    monsters.splice(j, 1);
                                    killCount++;
                                    killCountElement.textContent = `kill ${killCount}`;
                                    gainExp(1);
                                }

                                break;
                            }
                        }
            }
        }
        
        function startWave() {
            waveMonsterCount = 5 + (wave - 1) * 5;
            monsterSpawned = 0;
            waveActive = true;
            waveTimerActive = false;
            waveTimerElement.style.display = 'none';
        }
        
        function spawnMonster() {
                    if (monsterSpawned < waveMonsterCount) {
                        let type = 'normal';
                        // 从第6波开始可能出现特殊僵尸，且概率较低
                        if (wave > 5) {
                            const r = Math.random();
                            if (r < 0.08) type = 'fast';
                            else if (r < 0.08 + 0.06) type = 'tank';
                        }

                        monsters.push(new Monster(type));
                        monsterSpawned++;
                    }
        }
        
        function updateMonsters(deltaTime) {
            // 波次进行中，生成怪物
            if (waveActive && monsterSpawned < waveMonsterCount) {
                if (Math.random() < 0.05) {
                    spawnMonster();
                }
            }
            
            for (let i = monsters.length - 1; i >= 0; i--) {
                monsters[i].update(deltaTime);
                
                if (checkCollision(player, monsters[i])) {
                    gameRunning = false;
                    endGame();
                    break;
                }
            }
            
            // 检测波次是否结束
            if (waveActive && monsters.length === 0 && monsterSpawned >= waveMonsterCount) {
                waveActive = false;
                startWaveTimer();
            }
        }
        
        function startWaveTimer() {
            waveTimer = 5;
            waveTimerActive = true;
            waveTimerElement.style.display = 'block';
            waveTimerElement.textContent = waveTimer;
        }
        
        function updateWaveTimer(deltaTime) {
            if (waveTimerActive) {
                waveTimer -= deltaTime;
                if (waveTimer <= 0) {
                    waveTimer = 0;
                    waveTimerActive = false;
                    wave++;
                    waveCountElement.textContent = `wave ${wave}`;
                    startWave();
                }
                waveTimerElement.textContent = Math.ceil(waveTimer);
            }
        }
        
        function gainExp(amount) {
            if (!gameRunning) return;
            
            exp += amount;
            
            // 检查是否升级
            while (exp >= expToNextLevel) {
                levelUp();
            }
            
            updateExpBar();
        }
        
        function levelUp() {
            level++;
            exp -= expToNextLevel;
            expToNextLevel *= 2;
            
            // 更新等级显示
            levelTextElement.textContent = `Lv${level}`;
        }
        
        function updateExpBar() {
            const expPercentage = (exp / expToNextLevel) * 100;
            expBarElement.style.width = `${expPercentage}%`;
        }
        
        function updateAmmoDisplay() {
            ammoCountElement.textContent = `ammo ${player.ammo}/${player.maxAmmo}`;
        }
        
        function startReload() {
            player.isReloading = true;
            player.reloadProgress = 0;
            player.isEmptyFire = false;
        }
        
        function updateReload(deltaTime) {
            if (player.isReloading) {
                player.reloadProgress += deltaTime;
                
                if (player.reloadProgress >= player.reloadTime) {
                    player.isReloading = false;
                    player.reloadProgress = 0;
                    player.ammo = player.maxAmmo;
                    player.isEmptyFire = false;
                    updateAmmoDisplay();
                }
            }
            
            if (player.gunRecoil > 0) {
                player.gunRecoil = Math.max(0, player.gunRecoil - 80 * deltaTime);
            }

            // 根据后坐力驱动滑套偏移（像素），并限制最大位移
            player.slideOffset = Math.min(player.gunRecoil * 0.6, player.slideMax);
        }
        
        function endGame() {
            killCountElement.style.display = 'none';
            finalKillCountElement.textContent = `kill ${killCount}`;
            gameOverElement.style.display = 'block';
        }
        
        function updateParticles(deltaTime) {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(deltaTime);
                if (!particles[i].isAlive()) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制玩家身体
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - player.size / 2, player.y - player.size / 2, player.size, player.size);
            
            // 绘制玩家白色眼睛
            const eyeSize = 3;
            const eyeOffsetX = 5;
            const eyeOffsetY = -5;
            
            // 左眼
            ctx.beginPath();
            ctx.arc(player.x - eyeOffsetX, player.y + eyeOffsetY, eyeSize, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.closePath();
            
            // 右眼
            ctx.beginPath();
            ctx.arc(player.x + eyeOffsetX, player.y + eyeOffsetY, eyeSize, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.closePath();
            
            // 绘制枪（换弹时隐藏）
            if (!player.isReloading) {
                const gunX = player.x + 8;
                const gunY = player.y + 5;

                const dx = mouseX - player.x;
                const dy = mouseY - player.y;
                const angle = Math.atan2(dy, dx);

                ctx.save();
                ctx.translate(gunX, gunY);
                ctx.rotate(angle);

                // 保持枪在左右指向时“正向”显示：朝左时在 Y 方向翻转
                const flipY = Math.cos(angle) < 0 ? -1 : 1;
                ctx.scale(1, flipY);


                // ===== 握把 =====
                ctx.fillStyle = '#5C4033';
                ctx.fillRect(-3, 3, 6, 10);
                
                // ===== 扳机护卫 =====
                ctx.fillStyle = '#333333';
                ctx.beginPath();
                ctx.ellipse(0, 5, 3, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // ===== 套筒（独立后退） =====
                const slideOffsetX = -player.slideOffset;
                const slideHeight = 4;
                
                ctx.fillStyle = '#2C2C2C';
                ctx.fillRect(-8 + slideOffsetX, -slideHeight / 2, 20, slideHeight);
                
                ctx.strokeStyle = '#1A1A1A';
                ctx.lineWidth = 0.5;
                for (let i = 0; i < 4; i++) {
                    const x = -8 + slideOffsetX + (i + 1) * 4;
                    ctx.beginPath();
                    ctx.moveTo(x, -slideHeight / 2);
                    ctx.lineTo(x, 0);
                    ctx.stroke();
                }

                // 套筒前端指示窗
                ctx.fillStyle = '#FF6600';
                ctx.fillRect(11 + slideOffsetX, -1, 3, 2);

                // ===== 枪管 =====
                ctx.strokeStyle = '#555555';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(-2, slideHeight / 2 + 0.5);
                ctx.lineTo(10, slideHeight / 2 + 0.5);
                ctx.stroke();

                // ===== 击针孔 =====
                ctx.fillStyle = '#1A1A1A';
                ctx.beginPath();
                ctx.arc(8 + slideOffsetX, 0, 0.8, 0, Math.PI * 2);
                ctx.fill();

                // ===== 弹匣 =====
                ctx.fillStyle = '#8B7355';
                ctx.fillRect(-2, 8, 4, 4);
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(0, 12, 1.5, 0.8, 0, 0, Math.PI * 2);
                ctx.fill();

                // ===== 空枪标示 =====
                if (player.isEmptyFire) {
                    ctx.strokeStyle = '#FF0000';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(2, 0, 2.5, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();

                // ===== 枪口準星 =====
                const muzzleX = gunX + 12 * Math.cos(angle);
                const muzzleY = gunY + 12 * Math.sin(angle);
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(muzzleX, muzzleY, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            bullets.forEach(bullet => bullet.draw());
            monsters.forEach(monster => monster.draw());
            particles.forEach(particle => particle.draw());
            
            // 绘制换弹提示（在角色头顶）
            if (player.isReloading) {
                ctx.save();
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Reload', player.x, player.y - 40);
                ctx.restore();
            }
        }
        
        function gameLoop(timestamp = 0) {
            // 计算delta时间（秒）
            const deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            
            updatePlayer(deltaTime);
            if (gameRunning) {
                updateBullets();
                updateMonsters(deltaTime);
                updateWaveTimer(deltaTime);
                updateReload(deltaTime);
            }
            updateParticles(deltaTime);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            if (gameRunning) {
                fireGun();
            }
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && gameRunning && !player.isReloading) {
                startReload();
            }
        });
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // 初始化弹容量显示
        updateAmmoDisplay();
        
        // 开始第一波
        startWave();
        gameLoop();
    </script>
</body>
</html>
